<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepler — كيبلر للبصريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #080808;
            --bg2: #0e0e0e;
            --card: #121212;
            --card2: #181818;
            --gold: #b8933d;
            --gold2: #d4aa55;
            --goldG: linear-gradient(135deg, #b8933d, #d4aa55, #c9a84c);
            --text: #f2ede4;
            --muted: #6b6358;
            --border: rgba(184, 147, 61, 0.16);
            --danger: #c94444;
            --success: #3d8c5f;
            --info: #3d6f8c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        #stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ══ NAV ══ */
        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(8, 8, 8, 0.94);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid var(--border);
            padding: 0 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 66px;
        }
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 11px;
            text-decoration: none;
        }
        .logo-en {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 900;
            background: var(--goldG);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }
        .logo-ar {
            font-size: .58rem;
            color: var(--muted);
            letter-spacing: 1px;
            font-weight: 600;
        }
        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: .88rem;
            font-weight: 600;
            transition: color .25s;
        }
        .nav-links a:hover { color: var(--gold2); }
        .nav-r {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cur-toggle {
            display: flex;
            align-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }
        .cur-btn {
            border: none;
            background: transparent;
            padding: 5px 11px;
            font-family: 'Cairo', sans-serif;
            font-size: .75rem;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
        }
        .cur-btn.on {
            background: var(--goldG);
            color: #000;
        }
        .auth-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 7px 15px;
            color: var(--muted);
            font-family: 'Cairo', sans-serif;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s;
        }
        .auth-btn:hover { border-color: var(--gold); color: var(--gold); }
        .auth-btn img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            display: none;
        }
        .auth-btn.signed .auth-label { display: none; }
        .auth-btn.signed .g-avatar { display: block; }
        
        .cart-btn {
            background: var(--goldG);
            border: none;
            border-radius: 50px;
            padding: 8px 18px;
            color: #000;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: .82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cart-c {
            background: #000;
            color: var(--gold2);
            border-radius: 50%;
            width: 19px;
            height: 19px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
            font-weight: 900;
        }

        /* ══ HERO ══ */
        .hero {
            position: relative;
            z-index: 1;
            min-height: 65vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4.2vw, 3.6rem);
            font-weight: 900;
            line-height: 1.18;
            margin-bottom: 1rem;
        }
        .hero h1 span {
            background: var(--goldG);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .slogan {
            font-size: 1.05rem;
            color: var(--muted);
            font-weight: 600;
            font-style: italic;
            margin-bottom: 1.5rem;
            border-right: 3px solid var(--gold);
            padding-right: 12px;
        }

        /* ══ PRODUCTS ══ */
        .sec {
            padding: 4rem 8%;
            position: relative;
            z-index: 1;
        }
        .sec-head {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .sec-lbl {
            color: var(--gold2);
            font-size: .7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: .5rem;
            display: block;
        }
        .sec-head h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 3.2vw, 2.5rem);
            font-weight: 900;
        }
        .pgrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.5rem;
        }
        .pcard {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }
        .pbadge {
            position: absolute;
            top: 12px;
            right: 12px;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: .68rem;
            font-weight: 700;
            z-index: 2;
        }
        .bsale { background: var(--danger); color: #fff; }
        .bnew { background: var(--success); color: #fff; }
        .pimg {
            width: 100%;
            height: 220px;
            background: #fff;
            overflow: hidden;
            position: relative;
        }
        .pimg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s;
        }
        .pcard:hover .pimg img {
            transform: scale(1.06);
        }
        .pbody {
            padding: 1.2rem;
        }
        .pcat {
            color: var(--gold);
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: .2rem;
            display: block;
        }
        .pname {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: .4rem;
            line-height: 1.3;
        }
        .pdesc {
            color: var(--muted);
            font-size: .78rem;
            line-height: 1.5;
            margin-bottom: .8rem;
            height: 36px;
            overflow: hidden;
        }
        .prate {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: .72rem;
            margin-bottom: .8rem;
        }
        .stars { color: var(--gold2); }
        .rcount { color: var(--muted); }
        .prow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: .4rem;
            padding-top: .6rem;
            border-top: 1px solid rgba(184, 147, 61, 0.08);
        }
        .price {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--gold2);
        }
        .qty {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .qb {
            width: 26px;
            height: 26px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qv {
            font-size: .82rem;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }
        .addbtn {
            width: 100%;
            background: var(--goldG);
            border: none;
            border-radius: 10px;
            padding: 10px;
            color: #000;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            font-size: .85rem;
            cursor: pointer;
            margin-top: .8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* ══ CART DRAWER ══ */
        .cov {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .78);
            backdrop-filter: blur(7px);
            z-index: 9000;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }
        .cov.on { opacity: 1; pointer-events: all; }
        .cdrawer {
            position: fixed;
            top: 0;
            left: 0;
            width: min(420px, 95vw);
            height: 100vh;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            z-index: 9001;
            display: flex;
            flex-direction: column;
            transform: translateX(-112%);
            transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .cdrawer.on { transform: translateX(0); }
        .chead {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cbody {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
        }
        .cfoot {
            padding: 1.2rem;
            border-top: 1px solid var(--border);
        }
        .chkbtn {
            width: 100%;
            background: var(--goldG);
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: #000;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            cursor: pointer;
        }

        footer {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: var(--card2);
            border: 1px solid var(--gold);
            color: var(--text);
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 700;
            font-size: .8rem;
            z-index: 99999;
            transition: transform .3s;
        }
        .toast.on { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .hero { padding: 2rem 4%; text-align: center; }
            .sec { padding: 2rem 4%; }
        }
    </style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- NAV -->
<nav id="nav">
    <a class="logo-wrap" href="#">
        <div class="logo-text">
            <span class="logo-en">KEPLER</span>
            <span class="logo-ar">كيبلر للبصريات</span>
        </div>
    </a>
    <div class="nav-r">
        <div class="cur-toggle">
            <button class="cur-btn on" id="iqBtn" onclick="setCur('IQD')">د.ع</button>
            <button class="cur-btn" id="usdBtn" onclick="setCur('USD')">$</button>
        </div>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 <span class="cart-c" id="cartC">0</span>
        </button>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>حيث تلتقي الأناقة<br><span>بوضوح الرؤية</span></h1>
        <p class="slogan">"نوفر خدمة قبل أن نوفر منتج"</p>
    </div>
</section>

<!-- PRODUCTS -->
<section class="sec" id="products">
    <div class="sec-head">
        <span class="sec-lbl">🕶 مجموعتنا الحالية</span>
        <h2>المنتجات المتوفرة</h2>
    </div>
    <div class="pgrid" id="pgrid"></div>
</section>

<footer>
    <p>© 2026 Kepler.IQ — جميع الحقوق محفوظة لكيبلر للبصريات</p>
</footer>

<!-- CART -->
<div class="cov" id="cov" onclick="toggleCart()"></div>
<div class="cdrawer" id="cdrawer">
    <div class="chead">
        <h3>🛒 سلة المشتريات</h3>
        <button style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;" onclick="toggleCart()">✕</button>
    </div>
    <div class="cbody" id="cbody"></div>
    <div class="cfoot">
        <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
            <span>الإجمالي:</span>
            <strong id="ctotal" style="color:var(--gold2)">0 د.ع</strong>
        </div>
        <button class="chkbtn" onclick="checkout()">تأكيد الطلب عبر الواتساب</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const IMGS = {
    img_brown_polarized: "https://images.unsplash.com/photo-1511499767150-a48a237f0083?auto=format&fit=crop&w=600&q=80",
    img_blue_cut: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?auto=format&fit=crop&w=600&q=80"
};

const USD_RATE = 1310;
let currentCur = 'IQD';
let cart = [];

// 🌟 المصفوفة المعدلة: تم حذف رقم 22 وربط صورتها برقم 33 مباشرة
const PRODUCTS = [
    {
        id: 33,
        name: "محلول عدسات NEO PLUS",
        cat: "محاليل",
        desc: "محلول متعدد الاستعمالات لتنظيف وحفظ العدسات اللاصقة — تعقيم وترطيب عالي",
        price: 28000,
        badge: "عرض",
        badgeType: "sale",
        img: IMGS.img_brown_polarized // تم ربط صورة النظارة 22 هنا بنجاح
    },
    {
        id: 2,
        name: "عدسات ديفا الملونة",
        cat: "عدسات",
        desc: "عدسات لاصقة ملونة ومريحة جداً للعين تمنحك مظهراً طبيعياً وجذاباً",
        price: 25000,
        badge: "جديد",
        badgeType: "new",
        img: IMGS.img_blue_cut
    }
];

function init() {
    renderProducts();
    initStars();
}

function renderProducts() {
    const grid = document.getElementById('pgrid');
    grid.innerHTML = '';
    
    PRODUCTS.forEach(p => {
        const isIqd = currentCur === 'IQD';
        const finalPrice = isIqd ? `${p.price.toLocaleString()} د.ع` : `$${(p.price / USD_RATE).toFixed(2)}`;
        const itemInCart = cart.find(item => item.id === p.id);
        const qty = itemInCart ? itemInCart.qty : 1;

        grid.innerHTML += `
            <div class="pcard">
                ${p.badge ? `<span class="pbadge ${p.badgeType === 'sale' ? 'bsale' : 'bnew'}">${p.badge}</span>` : ''}
                <div class="pimg"><img src="${p.img}" alt="${p.name}"></div>
                <div class="pbody">
                    <span class="pcat">${p.cat}</span>
                    <h3 class="pname">${p.name}</h3>
                    <p class="pdesc">${p.desc}</p>
                    <div class="prate">
                        <span class="stars">★★★★★</span>
                        <span class="rcount">(4.9)</span>
                    </div>
                    <div class="prow">
                        <span class="price">${finalPrice}</span>
                        <div class="qty">
                            <button class="qb" onclick="event.stopPropagation(); changeProductQty(${p.id}, -1)">-</button>
                            <span class="qv" id="qty-${p.id}">${qty}</span>
                            <button class="qb" onclick="event.stopPropagation(); changeProductQty(${p.id}, 1)">+</button>
                        </div>
                    </div>
                    <button class="addbtn" onclick="addToCart(${p.id})">🛒 أضف إلى السلة</button>
                </div>
            </div>
        `;
    });
}

function changeProductQty(id, amt) {
    const qtyEl = document.getElementById(`qty-${id}`);
    let currentQty = parseInt(qtyEl.innerText);
    currentQty += amt;
    if (currentQty < 1) currentQty = 1;
    qtyEl.innerText = currentQty;
    
    const itemInCart = cart.find(item => item.id === id);
    if (itemInCart) {
        itemInCart.qty = currentQty;
        updateCartUI();
    }
}

function addToCart(id) {
    const prod = PRODUCTS.find(p => p.id === id);
    const qtyEl = document.getElementById(`qty-${id}`);
    const chosenQty = parseInt(qtyEl.innerText);
    
    const exist = cart.find(item => item.id === id);
    if (exist) {
        exist.qty = chosenQty;
    } else {
        cart.push({ ...prod, qty: chosenQty });
    }
    updateCartUI();
    showToast("تم إضافة المنتج إلى السلة");
}

function updateCartUI() {
    const cbody = document.getElementById('cbody');
    const countEl = document.getElementById('cartC');
    const totalEl = document.getElementById('ctotal');
    
    let total = 0;
    let count = 0;
    cbody.innerHTML = '';
    
    cart.forEach(item => {
        total += item.price * item.qty;
        count += item.qty;
        const isIqd = currentCur === 'IQD';
        const displayPrice = isIqd ? `${(item.price * item.qty).toLocaleString()} د.ع` : `$${((item.price * item.qty) / USD_RATE).toFixed(2)}`;
        
        cbody.innerHTML += `
            <div style="display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); align-items:center;">
                <img src="${item.img}" style="width:45px; height:45px; object-fit:cover; border-radius:6px;">
                <div style="flex:1;">
                    <div style="font-size:0.85rem; font-weight:700;">${item.name}</div>
                    <div style="font-size:0.75rem; color:var(--gold2);">${displayPrice} (العدد: ${item.qty})</div>
                </div>
                <button onclick="removeItem(${item.id})" style="background:none; border:none; color:var(--danger); cursor:pointer;">🗑️</button>
            </div>
        `;
    });
    
    if (cart.length === 0) {
        cbody.innerHTML = '<p style="text-align:center; color:var(--muted); padding:2rem;">السلة فارغة</p>';
    }
    
    countEl.innerText = count;
    const isIqd = currentCur === 'IQD';
    totalEl.innerText = isIqd ? `${total.toLocaleString()} د.ع` : `$${(total / USD_RATE).toFixed(2)}`;
}

function removeItem(id) {
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
    renderProducts();
}

function setCur(cur) {
    currentCur = cur;
    document.getElementById('iqBtn').classList.toggle('on', cur === 'IQD');
    document.getElementById('usdBtn').classList.toggle('on', cur === 'USD');
    renderProducts();
    updateCartUI();
}

function toggleCart() {
    document.getElementById('cdrawer').classList.toggle('on');
    document.getElementById('cov').classList.toggle('on');
}

function handleCredentialResponse(response) {
    console.log("Encoded JWT ID token: " + response.credential);
    showToast("تم تسجيل الدخول بنجاح");
}

function checkout() {
    if (cart.length === 0) return showToast("السلة فارغة");
    window.open("https://wa.me/9647746826442", "_blank");
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 2500);
}

function initStars() {
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let stars = [];
    for (let i = 0; i < 40; i++) {
        stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.2 });
    }
    ctx.fillStyle = 'rgba(184, 147, 61, 0.3)';
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

window.onload = init;
</script>
</body>
</html>
