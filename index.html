<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kepler — كيبلر للبصريات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;--bg2:#0c0c10;--card:#111116;--card2:#16161c;
  --gold:#c4953a;--gold2:#ddb04e;--goldG:linear-gradient(135deg,#c4953a,#ddb04e,#c9a84c);
  --text:#f0ece0;--muted:#6b6358;--soft:#9a9080;
  --border:rgba(196,149,58,.14);--border2:rgba(196,149,58,.26);
  --danger:#c94444;--success:#3d8c5f;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow-x:hidden;}

/* BG Orbs */
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbF var(--d,18s) ease-in-out infinite alternate;}
.o1{width:550px;height:550px;top:-15%;right:-12%;background:radial-gradient(circle,rgba(196,149,58,.055),transparent 70%);--d:17s;}
.o2{width:450px;height:450px;bottom:-8%;left:-8%;background:radial-gradient(circle,rgba(80,50,160,.04),transparent 70%);--d:23s;}
@keyframes orbF{0%{transform:translate(0,0) scale(1)}100%{transform:translate(28px,18px) scale(1.07)}}

/* CAT SIDEBAR */
.cov{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:8000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.cov.on{opacity:1;pointer-events:all;}
.csb{position:fixed;top:0;right:0;width:min(290px,88vw);height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:8001;display:flex;flex-direction:column;transform:translateX(110%);transition:transform .38s cubic-bezier(.4,0,.2,1);}
.csb.on{transform:translateX(0);}
.csb-head{padding:1.3rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.csb-head h3{font-size:.9rem;font-weight:800;background:var(--goldG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.clist{padding:.8rem .7rem;flex:1;overflow-y:auto;}
.ci{display:flex;align-items:center;gap:.8rem;padding:.8rem .9rem;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:3px;color:var(--soft);font-weight:600;font-size:.86rem;position:relative;}
.ci:hover{background:rgba(196,149,58,.07);color:var(--text);}
.ci.act{background:rgba(196,149,58,.1);color:var(--gold2);}
.ci.act::before{content:'';position:absolute;right:0;top:18%;height:64%;width:3px;background:var(--goldG);border-radius:3px;}

/* NAV */
nav{position:sticky;top:0;z-index:1000;background:rgba(6,6,8,.93);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border);padding:0 4%;display:flex;align-items:center;justify-content:space-between;height:62px;}
nav.sc{box-shadow:0 2px 30px rgba(0,0,0,.6);}
.ham{width:38px;height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;border:none;background:transparent;border-radius:8px;}
.hline{width:19px;height:1.4px;background:var(--gold2);border-radius:2px;transition:transform .28s,opacity .28s;}
.ham.op .hline:nth-child(1){transform:translateY(6.4px) rotate(45deg);}
.ham.op .hline:nth-child(2){opacity:0;transform:scaleX(0);}
.ham.op .hline:nth-child(3){transform:translateY(-6.4px) rotate(-45deg);}
.logo-a{display:flex;align-items:center;gap:9px;text-decoration:none;}
.ltxt{display:flex;flex-direction:column;line-height:1.1;}
.len{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;letter-spacing:3px;background:var(--goldG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lar{font-size:.52rem;color:var(--muted);letter-spacing:1.5px;font-weight:600;}
.nav-r{display:flex;align-items:center;gap:7px;}
.cur-tog{display:flex;background:var(--card);border:1px solid var(--border);border-radius:50px;}
.curb{border:none;background:transparent;padding:4px 9px;font-family:'Cairo',sans-serif;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;border-radius:50px;}
.curb.on{background:var(--goldG);color:#000;}
.cfab{position:relative;background:var(--goldG);border:none;border-radius:50px;padding:7px 15px;color:#000;font-family:'Cairo',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:5px;}
.cn{position:absolute;top:-7px;left:-6px;background:#000;color:var(--gold2);border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:900;border:1.5px solid var(--gold);}

/* HERO */
.hero{position:relative;z-index:1;min-height:45vh;display:flex;align-items:center;padding:4rem 7%;}
.hg{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:3rem;width:100%;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.8vw,3.2rem);font-weight:900;line-height:1.2;margin-bottom:.8rem;}
.hero h1 span{background:var(--goldG);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hslogan{font-size:.9rem;color:var(--gold);font-style:italic;font-weight:600;border-right:2px solid var(--gold);padding-right:10px;margin-bottom:1.1rem;}

/* CATALOG */
.sec{padding:4rem 7%;position:relative;z-index:1;}
.sec-alt{background:rgba(196,149,58,.018);}
.seh{text-align:center;margin-bottom:2.5rem;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.2rem;}

/* CARD */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all .35s;position:relative;}
.pcard:hover{transform:translateY(-6px);box-shadow:0 18px 45px rgba(0,0,0,.48);border-color:rgba(196,149,58,.26);}
.gal{position:relative;width:100%;height:255px;background:var(--card2);overflow:hidden;}
.gal-slides{display:flex;height:100%;transition:transform .38s ease;direction:ltr;}
.gal-slide{min-width:100%;height:100%;}
.gal-slide img{width:100%;height:100%;object-fit:cover;}
.gal-overlay{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:.65rem .85rem .7rem;background:linear-gradient(to top,rgba(6,6,8,.82),transparent);}
.gal-price{font-size:1.12rem;font-weight:900;color:#fff;}
.gal-arr{position:absolute;top:50%;transform:translateY(-50%);z-index:4;width:28px;height:28px;background:rgba(6,6,8,.55);border:1px solid rgba(255,255,255,.12);border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.arr-r{right:8px;} .arr-l{left:8px;}
.pbody{padding:.75rem .9rem .85rem;}
.pcat{color:var(--gold);font-size:.59rem;font-weight:700;text-transform:uppercase;margin-bottom:.22rem;}
.pname{font-size:.9rem;font-weight:800;}
.pname-en{font-size:.72rem;color:var(--soft);font-style:italic;margin-bottom:.5rem;}
.addbtn{width:100%;background:var(--goldG);border:none;border-radius:10px;padding:10px;color:#000;font-weight:800;font-size:.82rem;cursor:pointer;margin-top:.5rem;}

/* CART DRAWER */
.kov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:9000;opacity:0;pointer-events:none;transition:opacity .3s;}
.kov.on{opacity:1;pointer-events:all;}
.kdr{position:fixed;top:0;left:0;width:min(430px,95vw);height:100vh;background:var(--bg2);z-index:9001;display:flex;flex-direction:column;transform:translateX(-112%);transition:transform .4s ease;}
.kdr.on{transform:translateX(0);}
.kh{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kb{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.kitem{display:flex;gap:.7rem;padding:.75rem 0;border-bottom:1px solid var(--border);align-items:center;}
.kth{width:50px;height:50px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.kth img{width:100%;height:100%;object-fit:cover;}
.kf{padding:1rem 1.5rem;border-top:1px solid var(--border);}
.chkbtn{width:100%;background:var(--goldG);border:none;border-radius:10px;padding:13px;color:#000;font-weight:800;cursor:pointer;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);z-index:10000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;}
.mov.on{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;width:min(510px,100%);padding:1.7rem;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem;}
.fg input{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--text);outline:none;}

@media(max-width:900px){ .hg{grid-template-columns:1fr; text-align:center;} }
</style>
</head>
<body>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="cov" id="cov" onclick="toggleSb()"></div>
<div class="kov" id="kov" onclick="toggleCart()"></div>
<div class="mov" id="mov" onclick="if(event.target.id==='mov') closeModal()"></div>

<div class="csb" id="csb">
  <div class="csb-head"><h3>🗂 تصنيفات المعرض</h3><button onclick="toggleSb()" style="background:none;border:none;color:#fff;cursor:pointer;">✕</button></div>
  <div class="clist" id="cList"></div>
</div>

<nav id="nav">
  <button class="ham" id="ham" onclick="toggleSb()"><div class="hline"></div><div class="hline"></div><div class="hline"></div></button>
  <a class="logo-a" href="#">
    <div class="ltxt"><span class="len">KEPLER</span><span class="lar">كيبلر للبصريات</span></div>
  </a>
  <div class="nav-r">
    <div class="cur-tog">
      <button class="curb on" id="bIqd" onclick="setCur('IQD')">د.ع</button>
      <button class="curb" id="bUsd" onclick="setCur('USD')">$</button>
    </div>
    <button class="cfab" onclick="toggleCart()">🛒 <span class="cn" id="cartC">0</span></button>
  </div>
</nav>

<section class="hero">
  <div class="hg">
    <div>
      <h1>حيث تلتقي الأناقة<br><span>بوضوح الرؤية الكامل</span></h1>
      <p class="hslogan">"نوفر خدمة مخصصة ومستدامة قبل أن نوفر منتجاً"</p>
    </div>
  </div>
</section>

<section class="sec sec-alt" id="catalog">
  <div class="seh"><h2>معرض النظارات الفاخرة</h2><p>يتم تحديث البيانات تلقائياً من جدول البيانات</p></div>
  <div class="pgrid" id="pGrid"></div>
</section>

<div class="kdr" id="kdr">
  <div class="kh"><h3>🛒 سلة المشتريات</h3><button onclick="toggleCart()" style="background:none;border:none;color:#fff;cursor:pointer;">✕</button></div>
  <div class="kb" id="kIb"></div>
  <div class="kf">
    <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;"><span>العناصر:</span><strong id="kTotal">0 د.ع</strong></div>
    <button class="chkbtn" onclick="openCheckout()">المتابعة لتأكيد الطلب</button>
  </div>
</div>

<script>
// الرابط المباشر لجدول جوجل شيت المرفق من قبلك ومعدل ليقرأ كـ CSV
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1kr4kMPPIKXR4vpjB5prXVuSeD4xomxH-5F5VaAXi-gw/export?format=csv"; 
const WHATSAPP_NUM = "9647746826442";
const USD_RATE = 1310;

// الرابط الثابت لمستودع صور جيت هاب الخاص بك
const GITHUB_BASE_URL = "https://raw.githubusercontent.com/alsamawe2/picture-of-kepler/main/";

let PRODUCTS = [];
let cur = 'IQD';
let cart = [];
let actCat = 'الكل';
let galIdx = {};

window.addEventListener('DOMContentLoaded', loadSheetsData);

async function loadSheetsData() {
  try {
    const res = await fetch(SHEET_CSV_URL);
    const text = await res.text();
    const rows = text.split('\n').slice(1);
    
    PRODUCTS = rows.map((row, index) => {
      const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
      if(cols.length < 5 || !cols[2]) return null;
      
      // قراءة أسماء ملفات الصور وبناء الرابط تلقائياً
      let rawImgs = cols[5] ? cols[5].split(',') : [];
      let fullImgs = rawImgs.map(img => {
        img = img.trim();
        if(img.startsWith('http')) return img;
        return GITHUB_BASE_URL + img;
      });

      if(fullImgs.length === 0) {
        fullImgs.push("https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=600");
      }

      return {
        id: index + 1,
        cat: cols[1] || "عام",
        name: cols[2],
        nameEn: cols[3],
        price: parseFloat(cols[4]) || 0,
        imgs: fullImgs
      };
    }).filter(p => p !== null);

    setupCats();
    renderProducts();
  } catch (e) {
    console.error("Error loading sheet data:", e);
    document.getElementById('pGrid').innerHTML = "<p style='grid-column:1/-1; text-align:center; color:red;'>فشل في تحميل المنتجات، يرجى التأكد من ملء جدول البيانات.</p>";
  }
}

function setupCats(){
  const cats = ['الكل', ...new Set(PRODUCTS.map(p => p.cat))];
  const list = document.getElementById('cList');
  list.innerHTML = '';
  cats.forEach(c => {
    const div = document.createElement('div');
    div.className = `ci ${c === actCat ? 'act' : ''}`;
    div.onclick = () => { actCat = c; setupCats(); toggleSb(false); renderProducts(); };
    div.innerHTML = `<span>${c}</span>`;
    list.appendChild(div);
  });
}

function renderProducts(){
  const grid = document.getElementById('pGrid');
  grid.innerHTML = '';
  const filtered = actCat === 'الكل' ? PRODUCTS : PRODUCTS.filter(p => p.cat === actCat);

  if(filtered.length === 0) {
    grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:3rem; color:var(--soft);'>لا توجد منتجات معروضة حالياً.</p>";
    return;
  }

  filtered.forEach(p => {
    if(galIdx[p.id] === undefined) galIdx[p.id] = 0;
    const card = document.createElement('div');
    card.className = 'pcard';
    
    card.innerHTML = `
      <div class="gal">
        ${p.imgs.length > 1 ? `<button class="gal-arr arr-l" onclick="moveGal(${p.id},-1,event)">❯</button><button class="gal-arr arr-r" onclick="moveGal(${p.id},1,event)">❮</button>` : ''}
        <div class="gal-slides" id="slides-${p.id}" style="transform: translateX(0%); width: ${p.imgs.length * 100}%;">
          ${p.imgs.map(img => `<div class="gal-slide" style="width: ${100 / p.imgs.length}%;"><img src="${img}" alt=""></div>`).join('')}
        </div>
        <div class="gal-overlay"><div class="gal-price">${fmt(p.price)}</div></div>
      </div>
      <div class="pbody">
        <div class="pcat">${p.cat}</div>
        <h3 class="pname">${p.name}</h3>
        <div class="pname-en">${p.nameEn}</div>
        <button class="addbtn" onclick="add(${p.id})">🛒 أضف إلى السلة</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function moveGal(pid, dir, e) {
  e.stopPropagation();
  const p = PRODUCTS.find(x=>x.id===pid);
  let next = galIdx[pid] + dir;
  if(next >= p.imgs.length) next = 0;
  if(next < 0) next = p.imgs.length - 1;
  galIdx[pid] = next;
  // تحريك السلايدر لليمين واليسار بنسبة مئوية
  document.getElementById(`slides-${pid}`).style.transform = `translateX(${next * (100 / p.imgs.length)}%)`;
}

function add(pid){
  const p = PRODUCTS.find(x=>x.id===pid);
  const ext = cart.find(x => x.id === pid);
  if(ext) ext.qty++;
  else cart.push({ id: p.id, name: p.name, price: p.price, img: p.imgs[0], qty: 1 });
  updateCart();
}

function updateCart(){
  document.getElementById('cartC').innerText = cart.reduce((s,x)=>s+x.qty, 0);
  const ib = document.getElementById('kIb');
  ib.innerHTML = '';
  let tot = 0;
  cart.forEach(item => {
    tot += item.price * item.qty;
    ib.innerHTML += `<div class="kitem"><div class="kth"><img src="${item.img}"></div><div><strong>${item.name}</strong><br><span>${item.qty} × ${fmt(item.price)}</span></div></div>`;
  });
  document.getElementById('kTotal').innerText = fmt(tot);
}

function fmt(num){ return cur === 'IQD' ? num.toLocaleString('ar-IQ') + " د.ع" : "$" + (num / USD_RATE).toFixed(2); }
function setCur(c){ cur = c; document.getElementById('bIqd').classList.toggle('on',c==='IQD'); document.getElementById('bUsd').classList.toggle('on',c==='USD'); renderProducts(); updateCart(); }
function toggleSb(open){ const el = document.getElementById('csb'); el.classList.toggle('on', open !== undefined ? open : !el.classList.contains('on')); document.getElementById('cov').classList.toggle('on', el.classList.contains('on')); }
function toggleCart(open){ const el = document.getElementById('kdr'); el.classList.toggle('on', open !== undefined ? open : !el.classList.contains('on')); document.getElementById('kov').classList.toggle('on', el.classList.contains('on')); }
function closeModal(){ document.getElementById('mov').classList.remove('on'); }

function openCheckout(){
  toggleCart(false);
  document.getElementById('mov').innerHTML = `
    <div class="modal">
      <h3>📋 استكمال الطلب</h3><br>
      <div class="fg"><label>الاسم الكامل</label><input type="text" id="oName"></div>
      <div class="fg"><label>رقم الهاتف</label><input type="text" id="oPhone"></div>
      <div class="fg"><label>العنوان بالتفصيل</label><input type="text" id="oAddr"></div>
      <button class="chkbtn" onclick="sendOrder()">🚀 إرسال عبر الواتساب</button>
    </div>
  `;
  document.getElementById('mov').classList.add('on');
}

function sendOrder(){
  const name = document.getElementById('oName').value;
  const phone = document.getElementById('oPhone').value;
  const addr = document.getElementById('oAddr').value;
  if(!name || !phone || !addr) return alert("يرجى ملء الحقول");
  
  let txt = `🌟 طلب جديد من متجر كيبلر 🌟\n\nالعميل: ${name}\nالهاتف: ${phone}\nالعنوان: ${addr}\n\nالمنتجات:\n`;
  cart.forEach(x => { txt += `- ${x.name} × ${x.qty}\n`; });
  txt += `\nالعناصر: ${document.getElementById('kTotal').innerText}`;
  
  window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(txt)}`, '_blank');
  cart = []; updateCart(); closeModal();
}
</script>
</body>
</html>
